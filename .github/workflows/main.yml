name: Build Bitinning APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate Gradle wrapper jar (if missing)
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          gradle wrapper --gradle-version 8.2
        fi

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Release APK (signed with debug keystore)
      run: ./gradlew assembleRelease --stacktrace

    - name: Rename APK
      run: |
        mkdir -p app/build/outputs/apk/final
        cp app/build/outputs/apk/release/app-release.apk \
           app/build/outputs/apk/final/Bitinning-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Bitinning-APK
        path: app/build/outputs/apk/final/Bitinning-release.apk
        retention-days: 30
